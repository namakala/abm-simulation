[workspace]
authors = ["lam <lamuri.aly8@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "ABM"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
simulate = "python simulate.py"
test = "python -m pytest src/python/tests"
test-cov = "python -m pytest src/python/tests --cov=src/python --cov-report=html --cov-fail-under=85"
test-unit = "python -m pytest src/python/tests -m unit"
test-integration = "python -m pytest src/python/tests -m integration"
test-config = "python -m pytest src/python/tests -m config --no-cov"
test-slow = "python -m pytest src/python/tests -m slow"
benchmark = "python -m pytest src/python/tests -k benchmark --benchmark-only"
lint = "flake8 src/python/"
format = "black src/python/"
format-check = "black --check src/python/"
type-check = "mypy src/python/"
sort-imports = "isort src/python/"
security-bandit = "bandit -r src/python/"
extract-env = "bash src/shell/extract_env.sh"
update-env-example = "bash src/shell/update_env_example.sh"

[dependencies]
mesa = "3.3.0.*"
python = "3.12.11.*"
r-base = "4.5.1.*"
networkx = "3.5.*"
pytest-mock = "*"
pandas = "2.3.2.*"
pytest-cov = "*"
typing = "*"
hypothesis = "*"
bandit = "*"
pytest-html = "*"
safety = "*"
isort = "*"
numpy = "2.3.3.*"
dataclasses = "*"
pytest-xdist = "*"
pytest = "*"
python-dotenv = "*"
mypy = "*"
faker = "*"
flake8 = "*"
black = "*"
pytest-benchmark = "*"
coverage = "*"
matplotlib = "*"
seaborn = "*"
