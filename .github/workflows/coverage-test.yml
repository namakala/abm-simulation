name: Python Coverage and Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Coverage Test

    steps:
    - uses: actions/checkout@v4

    - uses: prefix-dev/setup-pixi@v0
      with:
        activate-environment: true

    - name: Run precommit checks
      env:
        DOTENV_FILE: .env.example
      run: pixi run prettify && pixi run format && pixi run lint && pixi run test-cov && pixi run test-config
